<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Subscription - GitHub Release Notifier</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117 url('/bg.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e6edf3;
    }

    .card {
      background: rgba(22, 27, 34, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(48, 54, 61, 0.6);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    h1 {
      color: #e6edf3;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    p {
      color: #8b949e;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .success { color: #56d364; }
    .error { color: #f85149; }

    .home-link {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.2s;
    }

    .home-link:hover { opacity: 0.9; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Confirming your subscription...</h1>
      <p>Please wait a moment.</p>
    </div>

    <div id="success" class="hidden">
      <div class="icon">&#9989;</div>
      <h1 class="success">Subscription confirmed!</h1>
      <p>You will now receive email notifications when new releases are published.</p>
      <a href="/" class="home-link">Go to homepage</a>
    </div>

    <div id="error" class="hidden">
      <div class="icon">&#10060;</div>
      <h1 class="error">Confirmation failed</h1>
      <p id="errorMessage">Something went wrong.</p>
      <a href="/" class="home-link">Go to homepage</a>
    </div>
  </div>

  <script>
    async function confirm() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        showError('No confirmation token provided.');
        return;
      }

      try {
        const res = await fetch(`/api/confirm/${encodeURIComponent(token)}`);

        if (res.ok) {
          showSuccess();
        } else {
          const status = res.status;
          if (status === 400) {
            showError('Invalid confirmation link.');
          } else if (status === 404) {
            showError('This confirmation link has already been used or is invalid.');
          } else {
            showError('Something went wrong. Please try again later.');
          }
        }
      } catch {
        showError('Network error. Please check your connection and try again.');
      }
    }

    function showSuccess() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('success').classList.remove('hidden');
    }

    function showError(message) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
      document.getElementById('errorMessage').textContent = message;
    }

    confirm();
  </script>
</body>
</html>
